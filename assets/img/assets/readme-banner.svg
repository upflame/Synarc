<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a" />
      <stop offset="50%" style="stop-color:#1e293b" />
      <stop offset="100%" style="stop-color:#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="100%" style="stop-color:#06b6d4" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" rx="12" fill="url(#bg)" />

  <!-- Glow orb -->
  <circle cx="100" cy="100" r="180" fill="url(#glow)" />

  <!-- Grid lines -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40" />
    <line x1="0" y1="80" x2="1200" y2="80" />
    <line x1="0" y1="120" x2="1200" y2="120" />
    <line x1="0" y1="160" x2="1200" y2="160" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="400" y1="0" x2="400" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="800" y1="0" x2="800" y2="200" />
    <line x1="1000" y1="0" x2="1000" y2="200" />
  </g>

  <!-- Decorative nodes -->
  <circle cx="80" cy="50" r="4" fill="#6366f1" opacity="0.5" />
  <circle cx="1120" cy="60" r="3" fill="#06b6d4" opacity="0.4" />
  <circle cx="950" cy="150" r="5" fill="#6366f1" opacity="0.3" />
  <circle cx="250" cy="160" r="3" fill="#06b6d4" opacity="0.5" />

  <!-- Logo mark -->
  <g transform="translate(60, 100)" filter="url(#shadow)">
    <rect x="-8" y="-44" width="16" height="88" rx="3" fill="url(#accent)" />
    <rect x="-8" y="-44" width="16" height="88" rx="3" fill="#fff" opacity="0.15" transform="translate(20, 0)" />
    <rect x="-8" y="-44" width="16" height="88" rx="3" fill="#fff" opacity="0.08" transform="translate(40, 0)" />
    <path d="M-8,-44 L8,-28 L-8,-12 L8,4 L-8,20 L8,36" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.5" />
  </g>

  <!-- Title -->
  <text x="160" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0" letter-spacing="-0.02em">
    Synarc
    <tspan fill="#818cf8" font-weight="400"> — </tspan>
    <tspan fill="#e2e8f0" font-weight="600" font-size="36">Autonomous Engineering Intelligence Runtime</tspan>
  </text>

  <!-- Tagline -->
  <text x="160" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" font-weight="400">
    Classify · Inject · Execute · Log · Aggregate · Checkpoint
  </text>

  <!-- Badge-style chips -->
  <g transform="translate(160, 140)">
    <rect x="0" y="0" width="105" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="53" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#818cf8" text-anchor="middle" font-weight="600">RUNTIME AGNOSTIC</text>

    <rect x="115" y="0" width="80" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="155" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#34d399" text-anchor="middle" font-weight="600">PRODUCTION</text>

    <rect x="205" y="0" width="110" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="260" y="17" font-family="system-ui, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="600">ZERO CONFIG</text>
  </g>

  <!-- Version in corner -->
  <text x="1090" y="180" font-family="monospace" font-size="12" fill="#475569" text-anchor="end">v5.0.0</text>
</svg>
